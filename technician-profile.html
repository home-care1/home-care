<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | ملفي - الفني</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/technician-profile.css">
</head>
<body data-required-role="technician">
    <div id="navbar-container"></div>
    <div class="main-content">
        <div class="container-luxury">
            <div class="page-header">
                <h1 class="page-title">الملف الشخصي</h1>
                <p class="page-subtitle">إدارة بياناتك الشخصية والإعدادات</p>
            </div>
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h2 id="profileName">---</h2>
                        <span class="profile-role">
                            <i class="fas fa-tools"></i>
                            <span id="profileRole">فني صيانة</span>
                        </span>
                        <p class="profile-email">
                            <i class="fas fa-envelope"></i>
                            <span id="profileEmail">---</span>
                        </p>
                    </div>
                </div>
                <div class="profile-body">
                    <div class="profile-section">
                        <h3 class="section-title">
                            <i class="fas fa-edit"></i> تعديل البيانات
                        </h3>
                        <form id="profileForm">
                            <div class="alert" id="profileAlert"></div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">الاسم الكامل</label>
                                    <input type="text" class="form-input" id="profileNameInput" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">رقم الهاتف</label>
                                    <input type="tel" class="form-input" id="profilePhoneInput" dir="rtl" placeholder="0599123456" pattern="[0-9]*" inputmode="numeric" onkeypress="return isNumberKey(event)">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">البريد الإلكتروني</label>
                                    <input type="email" class="form-input" id="profileEmailInput" dir="ltr" placeholder="example@email.com">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">المهنة</label>
                                    <input type="text" class="form-input" id="profileProfessionInput" dir="rtl" placeholder="أدخل مهنتك">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">نبذة عني</label>
                                <textarea class="form-textarea" id="profileBioTextarea" dir="rtl" rows="4" placeholder="اكتب نبذة عن خبراتك..."></textarea>
                            </div>
                        </form>
                    </div>

                    <div class="profile-section">
                        <label class="form-label">السيرة الذاتية (CV)</label>
                        <div class="cv-card">
                            <p class="cv-current-file" id="cvCurrentFileName">لا يوجد CV مرفق حاليا</p>
                            <input type="file" id="cvReplaceInput" class="cv-file-input" accept=".pdf,.doc,.docx">
                            <div class="cv-button-group">
                                <button type="button" class="btn-cv btn-cv-secondary" id="chooseCvBtn">
                                    <i class="fas fa-paperclip"></i> اختيار ملف
                                </button>
                                <button type="button" class="btn-cv btn-cv-primary" id="replaceCvBtn" disabled>
                                    <i class="fas fa-upload"></i> استبدال CV
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-save" form="profileForm">
                            <i class="fas fa-save"></i> حفظ التغييرات
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/technician-profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        fetch('navbar-technician.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });
    </script>
</body>
</html>
