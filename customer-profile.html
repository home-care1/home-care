<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | ملفي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/customer-profile.css">
</head>
<body data-required-role="customer">

    <div id="navbar-container"></div>

    <div class="main-content">
        <div class="container-luxury">
            <div class="page-header">
                <h1 class="page-title">الملف الشخصي</h1>
                <p class="page-subtitle">إدارة بياناتك الشخصية والإعدادات</p>
            </div>

            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h2 id="profileName">---</h2>
                        <span class="profile-role">
                            <i class="fas fa-user"></i>
                            <span id="profileRole">---</span>
                        </span>
                        <p class="profile-email">
                            <i class="fas fa-envelope"></i>
                            <span id="profileEmail">---</span>
                        </p>
                    </div>
                </div>
<div class="profile-body">
                    <div class="profile-section">
                        <h3 class="section-title">
                            <i class="fas fa-edit"></i> تعديل البيانات
                        </h3>
                        <form id="profileForm">
                            <div class="alert" id="profileAlert"></div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">الاسم الكامل</label>
                                    <input type="text" class="form-input" id="profileNameInput" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">رقم الهاتف</label>
                                    <input type="tel" class="form-input" id="profilePhoneInput" placeholder="0599123456" pattern="[0-9]*" inputmode="numeric" onkeypress="return isNumberKey(event)">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">العنوان</label>
                                <input type="text" class="form-input" id="profileAddressInput" placeholder="رام الله - شارع الإرسال">
                            </div>
                            <div class="form-group">
                                <label class="form-label">البريد الإلكتروني</label>
                                <input type="email" class="form-input" id="profileEmailInput" placeholder="example@email.com">
                            </div>
                            <div class="button-group">
                                <button type="submit" class="btn-save">
                                    <i class="fas fa-save"></i> حفظ التغييرات
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/customer-profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        fetch('navbar-customer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });
    </script>
</body>
</html>
