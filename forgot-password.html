<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | استعادة كلمة المرور</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-home"></i>
                </a>
                <h2 class="auth-title">HOME <span>CARE</span></h2>
                <p class="auth-subtitle">استعادة كلمة المرور</p>
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-input" id="forgotEmail" placeholder="example@email.com" required>
                </div>
                <button type="submit" class="btn-luxury">
                    <i class="fas fa-paper-plane"></i>
                    إرسال رابط الاستعادة
                </button>
            </form>

            <div id="successMessage" style="display:none; text-align:center; padding:20px; color:var(--primary-light);">
                <i class="fas fa-check-circle" style="font-size:3rem; margin-bottom:15px;"></i>
                <p>تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني</p>
            </div>

            <div class="auth-footer">
                <span class="auth-footer-text">تذكرت كلمة المرور؟ </span>
                <a href="login.html" class="auth-footer-link">تسجيل الدخول</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgotPasswordForm');
            const successMsg = document.getElementById('successMessage');

            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const email = document.getElementById('forgotEmail').value;
                    const btn = form.querySelector('button[type="submit"]');
                    
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

                    try {
                        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                            redirectTo: window.location.origin + '/reset-password.html'
                        });

                        if (error) {
                            await appAlert('حدث خطأ: ' + error.message);
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة';
                        } else {
                            form.style.display = 'none';
                            successMsg.style.display = 'block';
                        }
                    } catch (err) {
                        await appAlert('حدث خطأ، يرجى المحاولة مرة أخرى');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة';
                    }
                });
            }
        });
    </script>
</body>
</html>
