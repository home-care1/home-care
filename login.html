<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | دخول</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-home"></i>
                </a>
                <h2 class="auth-title">HOME <span>CARE</span></h2>
                <p class="auth-subtitle">تسجيل الدخول إلى حسابك</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                </div>
                <div class="forgot-password">
                    <a href="forgot-password.html">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="btn-luxury">
                    <i class="fas fa-sign-in-alt"></i>
                    دخول
                </button>
            </form>

            <div class="auth-footer">
                <span class="auth-footer-text">ليس لديك حساب؟ </span>
                <a href="register.html" class="auth-footer-link">إنشاء حساب</a>
            </div>
            

        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
