<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | إعادة تعيين كلمة المرور</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-home"></i>
                </a>
                <h2 class="auth-title">HOME <span>CARE</span></h2>
                <p class="auth-subtitle">إعادة تعيين كلمة المرور</p>
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label">كلمة المرور الجديدة</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label">تأكيد كلمة المرور</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-luxury">
                    <i class="fas fa-save"></i>
                    حفظ كلمة المرور
                </button>
            </form>

            <div id="successMessage" style="display:none; text-align:center; padding:20px; color:var(--primary-light);">
                <i class="fas fa-check-circle" style="font-size:3rem; margin-bottom:15px;"></i>
                <p>تم تغيير كلمة المرور بنجاح</p>
                <a href="login.html" class="auth-footer-link" style="margin-top:15px; display:inline-block;">تسجيل الدخول</a>
            </div>

            <div class="auth-footer">
                <a href="login.html" class="auth-footer-link">العودة لتسجيل الدخول</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('resetPasswordForm');
            const successMsg = document.getElementById('successMessage');
            const urlParams = new URLSearchParams(window.location.hash.substring(1));
            const errorCode = urlParams.get('error_code');
            const errorDesc = urlParams.get('error_description') || '';

            if (errorCode === 'otp_expired' || errorDesc.includes('expired')) {
                document.getElementById('resetPasswordForm').innerHTML = `
                    <div style="text-align:center; padding:20px; color:#ff6b6b;">
                        <i class="fas fa-exclamation-circle" style="font-size:3rem; margin-bottom:15px;"></i>
                        <p style="font-size:1.1rem; margin-bottom:10px;">انتهت صلاحية الرابط</p>
                        <p style="opacity:0.7; margin-bottom:20px;">يرجى طلب رابط جديد لإعادة تعيين كلمة المرور</p>
                        <a href="forgot-password.html" class="btn-luxury">طلب رابط جديد</a>
                    </div>
                `;
                return;
            }

            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    const btn = form.querySelector('button[type="submit"]');
                    
                    if (newPassword !== confirmPassword) {
                        await appAlert('كلمات المرور غير متطابقة');
                        return;
                    }

                    if (newPassword.length < 6) {
                        await appAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                        return;
                    }

                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

                    try {
                        const { data, error } = await supabaseClient.auth.updateUser({
                            password: newPassword
                        });

                        if (error) {
                            await appAlert('حدث خطأ: ' + error.message);
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fas fa-save"></i> حفظ كلمة المرور';
                        } else {
                            form.style.display = 'none';
                            successMsg.style.display = 'block';
                        }
                    } catch (err) {
                        await appAlert('حدث خطأ، يرجى المحاولة مرة أخرى');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-save"></i> حفظ كلمة المرور';
                    }
                });
            }
        });
    </script>
</body>
</html>
