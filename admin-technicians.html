<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | إدارة الفنيين</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-technicians.css">
</head>
<body data-required-role="admin">

    <div id="navbar-container"></div>
    <div class="main-content">
        <div class="container-luxury">
            <div class="page-header" style="display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center;">
                <h1 class="page-title">
                    <i class="fas fa-user-cog"></i>
                    إدارة الفنيين
                </h1>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">الكل</button>
                    <button class="filter-btn" data-filter="pending">قيد الانتظار</button>
                    <button class="filter-btn" data-filter="active">نشط</button>
                    <button class="filter-btn" data-filter="inactive">غير نشط</button>
                </div>
            </div>

            <div class="technicians-grid" id="techniciansList">
            </div>
        </div>
    </div>

    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-user"></i>
                    تفاصيل الفني
                </h2>
                <button class="modal-close" onclick="closeModal('viewModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="viewModalBody">
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-edit"></i>
                    تعديل الفني
                </h2>
                <button class="modal-close" onclick="closeModal('editModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">الحالة</label>
                    <select class="form-select" id="editStatus">
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closeModal('editModal')">إلغاء</button>
                    <button class="btn-submit" onclick="saveEdit()">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-exclamation-triangle"></i>
                    تأكيد الحذف
                </h2>
                <button class="modal-close" onclick="closeModal('deleteModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="delete-warning-text" id="deleteWarningText"></p>
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closeModal('deleteModal')">إلغاء</button>
                    <button class="btn-submit" onclick="confirmDelete()" style="background: linear-gradient(135deg, #d32f2f 0%, #f44336 100%);">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/common.js"></script>
    <script src="js/admin-technicians.js"></script>
    <script>
        fetch('navbar-admin.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                loadNotifDropdown();
            });
    </script>
</body>
</html>
