<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | إنشاء حساب</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-user-plus"></i>
                </a>
                <h2 class="auth-title">HOME <span>CARE</span></h2>
                <p class="auth-subtitle">إنشاء حساب جديد</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">الاسم الكامل</label>
                    <input type="text" class="form-input" id="registerName" placeholder="الاسم الكامل" required>
                </div>

                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-input" id="registerEmail" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" class="form-input" id="registerPhone" placeholder="05xxxxxxxx" pattern="[0-9]+" title="يرجى إدخال أرقام فقط" required>
                </div>

                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label">نوع الحساب</label>
                    <select class="form-select" id="registerRole" required>
                        <option value="">اختر نوع الحساب...</option>
                        <option value="customer">👤 عميل (أبحث عن خدمة)</option>
                        <option value="technician">🔧 فني (أقدم خدمات صيانة)</option>
                    </select>
                </div>

                <div class="form-group" id="professionGroup" style="display: none;">
                    <label class="form-label">التخصصات</label>
                    <div class="specialty-options">
                        <label class="specialty-option">
                            <input type="checkbox" name="specialty" value="كهرباء">
                            كهرباء
                        </label>
                        <label class="specialty-option">
                            <input type="checkbox" name="specialty" value="سباكة">
                            سباكة
                        </label>
                        <label class="specialty-option">
                            <input type="checkbox" name="specialty" value="تكييف">
                            تكييف
                        </label>
                        <label class="specialty-option">
                            <input type="checkbox" name="specialty" value="نجارة">
                            نجارة
                        </label>
                        <label class="specialty-option">
                            <input type="checkbox" name="specialty" value="دهان">
                            دهان
                        </label>
                        <label class="specialty-option">
                            <input type="checkbox" name="specialty" value="أخرى" id="otherSpecialtyOption">
                            أخرى
                        </label>
                    </div>

                    <input type="text" class="form-input other-specialty-input" id="otherSpecialtyInput" placeholder="اكتب تخصصك" style="display: none;">
                </div>

                <div class="form-group" id="cvGroup" style="display: none;">
                    <label class="form-label" for="technicianCv">إرفاق السيرة الذاتية (CV)</label>
                    <input type="file" class="form-input" id="technicianCv" accept=".pdf,.doc,.docx">
                </div>

                <button type="submit" class="btn-luxury">
                    <i class="fas fa-user-plus"></i>
                    إنشاء الحساب
                </button>
            </form>

            <div class="auth-footer">
                <span class="auth-footer-text">لديك حساب؟ </span>
                <a href="login.html" class="auth-footer-link">سجل دخولك</a>
            </div>
        </div>
    </div>

    <div class="custom-modal" id="customModal" style="display: none;">
        <div class="custom-modal-card">
            <h3 class="custom-modal-title" id="customModalTitle">تنبيه</h3>
            <p class="custom-modal-message" id="customModalMessage"></p>
            <button type="button" class="custom-modal-btn" id="customModalBtn">حسنا</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/common.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
