<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | التقييمات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/technician-completed-orders.css">
</head>

<body data-required-role="technician">
    <div id="navbar-container"></div>
    <div class="main-content">
        <div class="container-luxury">
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-clipboard-check"></i>
                    التقييمات
                </h1>
                <div class="rating-summary" id="ratingSummary">
                    <div class="rating-average">
                        <div class="rating-number" id="avgRating">0.0</div>
                        <div class="rating-label">التقييم المتوسط</div>
                        <div class="rating-stars" id="avgStars">

                        </div>
                    </div>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-mini">
                    <div class="stat-mini-number" id="totalCompleted">0</div>
                    <div class="stat-mini-label">إجمالي المكتملة</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-number" id="ratedCount">0</div>
                    <div class="stat-mini-label">مع تقييم</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-number" id="unratedCount">0</div>
                    <div class="stat-mini-label">بدون تقييم</div>
                </div>
            </div>
            <div class="filters-bar">
                <button class="filter-btn active" data-filter="all" onclick="filterOrders('all')">
                    <i class="fas fa-list"></i> الكل
                </button>
                <button class="filter-btn" data-filter="rated" onclick="filterOrders('rated')">
                    <i class="fas fa-star"></i> مع تقييم
                </button>
                <button class="filter-btn" data-filter="unrated" onclick="filterOrders('unrated')">
                    <i class="fas fa-star-half-alt"></i> بدون تقييم
                </button>
            </div>
            <div class="completed-orders-grid" id="completedOrdersList">
            </div>
        </div>
    </div>
    <div class="modal" id="orderDetailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-wrapper">
                    <div class="modal-icon">
                        <i class="fas fa-clipboard-list"></i>
                    </div>
                    <h3>تفاصيل الطلب</h3>
                </div>
                <button class="modal-close" onclick="closeOrderDetailsModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="order-details-content">
                    <div class="detail-row">
                        <span class="detail-label">رقم الطلب:</span>
                        <span class="detail-value" id="detailOrderId"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">نوع الخدمة:</span>
                        <span class="detail-value" id="detailTitle"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الوصف:</span>
                        <span class="detail-value" id="detailDescription"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">العميل:</span>
                        <span class="detail-value" id="detailCustomer"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الهاتف:</span>
                        <span class="detail-value" id="detailPhone"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الموقع:</span>
                        <span class="detail-value" id="detailAddress"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">التاريخ:</span>
                        <span class="detail-value" id="detailDate"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الوقت:</span>
                        <span class="detail-value" id="detailTime"></span>
                    </div>

                    <div class="detail-row" id="detailRatingRow">
                        <span class="detail-label">التقييم:</span>
                        <span class="detail-value" id="detailRating"></span>
                    </div>
                    <div class="detail-row" id="detailReviewRow">
                        <span class="detail-label">تعليق العميل:</span>
                        <span class="detail-value" id="detailReview"></span>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closeOrderDetailsModal()">
                        <i class="fas fa-times"></i>
                        إغلاق
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/fix-orders.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/order-visibility.js"></script>
    <script src="js/technician-completed-orders.js"></script>
    <script>
        fetch('navbar-technician.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });
    </script>
</body>

</html>
