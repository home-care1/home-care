<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | طلباتي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/technician-accepted-orders.css">
</head>
<body data-required-role="technician">
    <div id="navbar-container"></div>
    <div class="main-content">
        <div class="container-luxury">
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-clipboard-check"></i>
                    طلباتي
                </h1>
                <div class="orders-stats" id="ordersStats">
                    <div class="orders-stat-item">
                        <div class="orders-stat-number" id="acceptedCount">0</div>
                        <div class="orders-stat-label">مقبول</div>
                    </div>
                    <div class="orders-stat-item">
                        <div class="orders-stat-number" id="inProgressCount">0</div>
                        <div class="orders-stat-label">قيد العمل</div>
                    </div>
                    <div class="orders-stat-item">
                        <div class="orders-stat-number" id="completedCount">0</div>
                        <div class="orders-stat-label">مكتمل</div>
                    </div>
                </div>
            </div>
            <div class="filters-bar">
                <button class="filter-btn active" data-filter="all" onclick="filterMyOrders('all')">
                    <i class="fas fa-list"></i> الكل
                </button>
                <button class="filter-btn" data-filter="accepted" onclick="filterMyOrders('accepted')">
                    <i class="fas fa-check-circle"></i> مقبول
                </button>
                <button class="filter-btn" data-filter="in_progress" onclick="filterMyOrders('in_progress')">
                    <i class="fas fa-spinner"></i> قيد العمل
                </button>
                <button class="filter-btn" data-filter="completed" onclick="filterMyOrders('completed')">
                    <i class="fas fa-check-double"></i> مكتمل
                </button>
                
            </div>
            <div class="accepted-orders-grid" id="myOrdersList">
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-clipboard-list empty-state-icon"></i>
                <h3 class="empty-state-title">لا توجد طلبات</h3>
                <p class="empty-state-desc">لم تقم بقبول أي طلبات بعد</p>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-clipboard-list"></i>
                    تفاصيل الطلب
                </h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/fix-orders.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/order-visibility.js"></script>
    <script src="js/technician-accepted-orders.js"></script>
    <script>
        fetch('navbar-technician.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });
    </script>
</body>
</html>
