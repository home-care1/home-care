<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/image.png">
    <title>HOME CARE | إشعارات الفني</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body data-required-role="technician">
    <nav class="navbar-luxury">
        <div class="navbar-container">
            <a class="navbar-brand" href="index.html">
                <div class="navbar-logo">
                    <i class="fas fa-home"></i>
                </div>
                <span class="navbar-text">HOME <span>CARE</span></span>
            </a>
            <ul class="navbar-menu">
                <li>
                    <a class="navbar-link" href="technician-dashboard.html">
                        <i class="fas fa-home"></i> الرئيسية
                    </a>
                </li>
                <li>
                    <a class="navbar-link" href="technician-all-orders.html">
                        <i class="fas fa-clock"></i> الطلبات الجديدة
                    </a>
                </li>
                <li>
                    <a class="navbar-link" href="technician-accepted-orders.html">
                        <i class="fas fa-clipboard-check"></i> طلباتي
                    </a>
                </li>
                <li>
                    <a class="navbar-link" href="technician-completed-orders.html">
                        <i class="fas fa-star"></i> التقييمات
                    </a>
                </li>
                <li>
                    <a class="navbar-link" href="technician-profile.html">
                        <i class="fas fa-user"></i> ملفي
                    </a>
                </li>
                <li>
                    <a href="#" class="navbar-btn" onclick="logout(); return false;">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="main-content">
        <div class="container-luxury">
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-bell"></i> إشعارات الفني
                </h1>
                <p class="page-subtitle">جميع إشعاراتك في مكان واحد</p>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterNotifications(event, 'all')">الكل</button>
                <button class="filter-tab" onclick="filterNotifications(event, 'new')">طلبات جديدة</button>
                <button class="filter-tab" onclick="filterNotifications(event, 'accepted')">مقبول</button>
                <button class="filter-tab" onclick="filterNotifications(event, 'completed')">مكتمل</button>
                <button class="filter-tab delete-all-tab" onclick="deleteAllNotifications()">
                    <i class="fas fa-trash-alt"></i> حذف الكل
                </button>
            </div>
            <div class="notif-page-card">
                <ul class="notif-page-list" id="notificationsList">
                </ul>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/technician-notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
